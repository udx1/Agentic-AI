<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Grocery Tracker — Wireframes</title>

<style>
  :root {
    --accent: #16a34a;
    --ink: #1f2421;
    --ink-soft: #6b7280;
    --line: #e4e6e4;
    --line-strong: #d3d6d3;
    --paper: #ffffff;
    --bg: #f4f5f3;
    --ph: #e9eae8;
    --ph-dark: #d2d5d2;
    --dash: #c2c6c2;
    --radius: 12px;
    --pad: 22px;
    --gap: 18px;
    --maxw: 1180px;
    --sans: "Helvetica Neue", Helvetica, Arial, system-ui, sans-serif;
    --mono: "SFMono-Regular", ui-monospace, "Cascadia Code", Menlo, Consolas, monospace;
  }
  :root[data-density="compact"] { --pad: 15px; --gap: 12px; }
  :root[data-fill="hatched"] {
    --ph: repeating-linear-gradient(45deg, #e9eae8 0 5px, #f2f3f1 5px 10px);
    --ph-dark: repeating-linear-gradient(45deg, #d2d5d2 0 5px, #e0e2e0 5px 10px);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--sans);
    -webkit-font-smoothing: antialiased;
    line-height: 1.4;
  }

  /* placeholders */
  .wf-ph { background: var(--ph); }
  .wf-ph--dark { background: var(--ph-dark); }
  .wf-dash {
    background: repeating-linear-gradient(0deg, transparent, transparent),
                var(--paper);
    border: 1.5px dashed var(--dash);
  }
  :root[data-fill="hatched"] .wf-dash { background: var(--ph); }

  .wf-cap { font-size: 11px; color: var(--ink-soft); letter-spacing: .01em; }

  /* annotation note (monospace) */
  .wf-note {
    font-family: var(--mono);
    font-size: 10.5px;
    color: var(--accent);
    background: color-mix(in oklch, var(--accent) 8%, white);
    border: 1px solid color-mix(in oklch, var(--accent) 25%, white);
    border-radius: 7px;
    padding: 6px 9px;
    max-width: 188px;
    line-height: 1.45;
    display: flex;
    gap: 7px;
    align-items: flex-start;
    z-index: 5;
    box-shadow: 0 2px 8px rgba(0,0,0,.05);
  }
  .wf-note__dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); margin-top: 4px; flex-shrink: 0; }
  .wf-noterow { display: flex; gap: 10px; flex-wrap: wrap; margin: -8px 0 20px; }
  .wf-noterow .wf-note { max-width: 340px; }

  /* ===== document chrome ===== */
  .wf-doc { max-width: var(--maxw); margin: 0 auto; padding: 34px 26px 70px; }
  .wf-doc__hd { display: flex; align-items: center; justify-content: space-between; gap: 20px; flex-wrap: wrap; margin-bottom: 34px; }
  .wf-doc__hd h1 { font-size: 21px; margin: 0; font-weight: 700; letter-spacing: -.01em; }
  .wf-doc__hd p { margin: 4px 0 0; font-size: 12.5px; color: var(--ink-soft); }
  .wf-logo { background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .wf-logo--lg { width: 38px; height: 38px; border-radius: 10px; }
  .wf-stamp {
    font-family: var(--mono); font-size: 10px; letter-spacing: .12em; text-transform: uppercase;
    color: var(--ink-soft); border: 1px dashed var(--line-strong); border-radius: 20px; padding: 6px 12px;
  }

  /* ===== sections ===== */
  .wf-section { margin-bottom: 40px; }
  .wf-section__hd { display: flex; align-items: flex-start; gap: 14px; margin-bottom: 20px; flex-wrap: wrap; }
  .wf-section__num { font-family: var(--mono); font-size: 12px; color: var(--accent); border: 1.5px solid var(--accent); border-radius: 8px; padding: 5px 8px; font-weight: 600; }
  .wf-section__hd h2 { font-size: 16px; margin: 1px 0 0; font-weight: 700; letter-spacing: -.01em; }
  .wf-section__hd p { margin: 5px 0 0; font-size: 12.5px; color: var(--ink-soft); max-width: 560px; }
  .wf-section__hd p b { color: var(--ink); }

  /* segmented control */
  .wf-seg { display: inline-flex; background: #e8eae7; border-radius: 10px; padding: 3px; margin-left: auto; }
  .wf-seg__btn { font-family: var(--sans); font-size: 12.5px; font-weight: 600; color: var(--ink-soft); border: 0; background: transparent; padding: 7px 16px; border-radius: 7px; cursor: pointer; transition: .15s; }
  .wf-seg__btn.is-active { background: var(--paper); color: var(--ink); box-shadow: 0 1px 3px rgba(0,0,0,.1); }

  /* ===== shell mini comparison ===== */
  .wf-mini-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
  @media (max-width: 980px) { .wf-mini-row { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 560px) { .wf-mini-row { grid-template-columns: 1fr; } }
  .wf-mini-pick { text-align: left; border: 0; background: transparent; padding: 0; cursor: pointer; font-family: inherit; }
  .wf-mini-card {
    background: var(--paper); border: 1.5px solid var(--line); border-radius: var(--radius);
    padding: 14px; transition: .18s; height: 100%;
  }
  .wf-mini-pick:hover .wf-mini-card { border-color: var(--line-strong); transform: translateY(-2px); }
  .wf-mini-pick.is-active .wf-mini-card { border-color: var(--accent); box-shadow: 0 0 0 3px color-mix(in oklch, var(--accent) 16%, white); }
  .wf-mini-card__hd { display: flex; align-items: center; justify-content: space-between; margin-bottom: 11px; }
  .wf-tag { font-family: var(--mono); font-size: 9px; text-transform: uppercase; letter-spacing: .08em; color: var(--accent); background: color-mix(in oklch, var(--accent) 12%, white); padding: 3px 7px; border-radius: 20px; }

  .wf-mini { background: var(--bg); border: 1px solid var(--line); border-radius: 9px; height: 150px; overflow: hidden; display: flex; flex-direction: column; }
  .wf-mini__topbar { background: var(--paper); border-bottom: 1px solid var(--line); padding: 8px 10px; display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .wf-mini__topbar--slim { justify-content: flex-start; }
  .wf-mini__tabs { display: flex; gap: 5px; }
  .wf-mini__tab { width: 20px; height: 16px; border-radius: 4px; background: #ededed; display: flex; align-items: center; justify-content: center; }
  .wf-mini__tab.is-active { background: color-mix(in oklch, var(--accent) 14%, white); }
  .wf-mini__side { width: 42px; background: var(--paper); border-right: 1px solid var(--line); padding: 9px 7px; }
  .wf-mini__sidetop { background: var(--paper); border-bottom: 1px solid var(--line); padding: 8px 10px; }
  .wf-mini__body { flex: 1; padding: 9px; display: flex; flex-direction: column; gap: 8px; }
  .wf-mini__kpis { display: flex; gap: 6px; }
  .wf-mini__kpi { flex: 1; height: 22px; border-radius: 4px; }
  .wf-mini__charts { flex: 1; display: flex; gap: 8px; }
  .wf-mini__donut { width: 46px; height: 46px; border-radius: 50%; background: conic-gradient(var(--accent) 0 32%, #cfcfcf 32% 60%, #dcdcdc 60% 80%, #bdbdbd 80% 100%); flex-shrink: 0; align-self: center; position: relative; }
  .wf-mini__donut::after { content: ""; position: absolute; inset: 15px; border-radius: 50%; background: var(--bg); }
  .wf-mini__bars { flex: 1; display: flex; flex-direction: column; gap: 6px; justify-content: center; }
  .wf-mini__bottombar { background: var(--paper); border-top: 1px solid var(--line); padding: 7px 18px; display: flex; justify-content: space-around; }
  .wf-mini__pill { position: relative; margin: -22px auto 8px; background: var(--paper); border: 1px solid var(--line); border-radius: 20px; padding: 5px 8px; display: flex; gap: 6px; box-shadow: 0 3px 10px rgba(0,0,0,.08); }

  /* ===== full-size stage & frame ===== */
  .wf-stage { background: var(--bg); border: 1.5px dashed var(--line-strong); border-radius: 16px; padding: 20px; }
  .wf-frame { background: var(--paper); border: 1.5px solid var(--line); border-radius: var(--radius); overflow: hidden; min-height: 560px; box-shadow: 0 4px 22px rgba(0,0,0,.05); }
  .wf-frame--side { display: flex; }

  /* topbar */
  .wf-topbar { display: flex; align-items: center; gap: 20px; padding: 13px 22px; border-bottom: 1px solid var(--line); }
  .wf-topbar--slim { justify-content: space-between; }
  .wf-tabs { display: flex; gap: 4px; margin: 0 auto 0 16px; }
  .wf-tab { display: flex; align-items: center; gap: 8px; font-family: var(--sans); font-size: 13px; font-weight: 600; color: var(--ink-soft); background: transparent; border: 0; padding: 8px 14px; border-radius: 9px; cursor: pointer; transition: .15s; }
  .wf-tab:hover { background: var(--bg); }
  .wf-tab.is-active { background: color-mix(in oklch, var(--accent) 10%, white); color: var(--accent); }
  .wf-tab--v { width: 100%; }

  /* sidebar */
  .wf-sidebar { width: 210px; flex-shrink: 0; border-right: 1px solid var(--line); padding: 18px 14px; display: flex; flex-direction: column; }
  .wf-sidebar .wf-tab.is-active { background: color-mix(in oklch, var(--accent) 10%, white); }
  .wf-sb-card { border: 1px solid var(--line); border-radius: 9px; padding: 11px; }
  .wf-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--ph-dark); flex-shrink: 0; }

  /* main content area */
  .wf-main { flex: 1; padding: 26px; min-width: 0; }
  .wf-main--padbottom { padding-bottom: 84px; }

  /* bottom bar */
  .wf-frame--bottom { position: relative; }
  .wf-bottombar { position: absolute; left: 0; right: 0; bottom: 0; background: var(--paper); border-top: 1px solid var(--line); display: flex; justify-content: space-around; padding: 9px 0 10px; }
  .wf-btab { display: flex; flex-direction: column; align-items: center; gap: 3px; font-family: var(--sans); font-size: 10.5px; font-weight: 600; color: var(--ink-soft); border: 0; background: transparent; cursor: pointer; padding: 2px 14px; }
  .wf-btab.is-active { color: var(--accent); }

  /* floating pill nav */
  .wf-frame--pill { position: relative; }
  .wf-pillnav { position: absolute; left: 50%; transform: translateX(-50%); bottom: 18px; background: var(--paper); border: 1px solid var(--line); border-radius: 30px; padding: 6px; display: flex; gap: 4px; box-shadow: 0 6px 22px rgba(0,0,0,.12); }
  .wf-ptab { display: flex; align-items: center; gap: 7px; font-family: var(--sans); font-size: 12.5px; font-weight: 600; color: var(--ink-soft); border: 0; background: transparent; padding: 8px 16px; border-radius: 22px; cursor: pointer; transition: .15s; }
  .wf-ptab.is-active { background: var(--accent); color: #fff; }

  /* ===== screen internals ===== */
  .wf-screen { display: flex; flex-direction: column; }
  .wf-screen__hd { display: flex; align-items: flex-start; justify-content: space-between; gap: 18px; margin-bottom: 22px; flex-wrap: wrap; }

  .wf-panel { background: var(--paper); border: 1px solid var(--line); border-radius: var(--radius); overflow: hidden; }
  .wf-panel__hd { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 13px var(--pad); border-bottom: 1px solid var(--line); }
  .wf-panel__icon { color: var(--accent); display: flex; }
  .wf-panel__title { font-size: 13px; font-weight: 700; }
  .wf-panel__bd { padding: var(--pad); }

  /* buttons */
  .wf-btn { display: inline-flex; align-items: center; gap: 7px; font-size: 12.5px; font-weight: 600; color: var(--ink); background: var(--bg); border: 1px solid var(--line-strong); border-radius: 9px; padding: 9px 15px; cursor: pointer; }
  .wf-btn--sm { padding: 6px 12px; font-size: 11.5px; }
  .wf-btn--primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .wf-btn--ghost { background: var(--paper); }

  /* chips */
  .wf-chip { display: inline-flex; align-items: center; gap: 6px; font-size: 11.5px; font-weight: 600; color: var(--ink-soft); background: var(--bg); border: 1px solid var(--line); border-radius: 20px; padding: 6px 12px; }
  .wf-chip--ok { color: var(--accent); background: color-mix(in oklch, var(--accent) 9%, white); border-color: color-mix(in oklch, var(--accent) 22%, white); }

  /* drop zone */
  .wf-drop__icon { color: var(--accent); }

  /* table */
  .wf-trow { display: flex; align-items: center; gap: 14px; padding: 12px var(--pad); border-bottom: 1px solid var(--line); }
  .wf-trow:last-child { border-bottom: 0; }
  .wf-trow--head { background: var(--bg); padding-top: 10px; padding-bottom: 10px; }
  .wf-th { font-size: 10.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--ink-soft); }

  /* KPI row */
  .wf-kpis { display: grid; grid-template-columns: repeat(4, 1fr); gap: var(--gap); margin-bottom: var(--gap); }
  @media (max-width: 720px) { .wf-kpis { grid-template-columns: repeat(2, 1fr); } }
  .wf-kpi { background: var(--paper); border: 1px solid var(--line); border-radius: var(--radius); padding: 16px; }

  /* dashboard grid */
  .wf-dash-grid { display: grid; grid-template-columns: 1.15fr 1fr; gap: var(--gap); margin-bottom: var(--gap); }
  @media (max-width: 820px) { .wf-dash-grid { grid-template-columns: 1fr; } }
  .wf-donut-row { display: flex; align-items: center; gap: 28px; flex-wrap: wrap; justify-content: center; }
  .wf-trend { display: flex; align-items: flex-end; gap: 8px; height: 120px; }

  /* predict */
  .wf-predict-grid { display: grid; grid-template-columns: 1.7fr 1fr; gap: var(--gap); }
  @media (max-width: 820px) { .wf-predict-grid { grid-template-columns: 1fr; } }
  .wf-cat-group { margin-bottom: 6px; }
  .wf-cat-group:last-child { margin-bottom: 0; }
  .wf-cat-hd { display: flex; align-items: center; gap: 12px; margin: 14px 0 10px; }
  .wf-cat-group:first-child .wf-cat-hd { margin-top: 0; }
  .wf-cat-name { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; color: var(--ink-soft); white-space: nowrap; }
  .wf-cat-line { flex: 1; height: 1px; background: var(--line); }
  .wf-check-row { display: flex; align-items: center; gap: 13px; padding: 9px 0; }
  .wf-check { width: 19px; height: 19px; border-radius: 5px; border: 1.5px solid var(--line-strong); flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
  .wf-check--on { background: var(--accent); border-color: var(--accent); }
  .wf-freq { font-family: var(--mono); font-size: 10px; color: var(--ink-soft); background: var(--bg); border-radius: 5px; padding: 4px 8px; white-space: nowrap; flex-shrink: 0; }
  .wf-freq--due { color: var(--accent); background: color-mix(in oklch, var(--accent) 10%, white); font-weight: 600; }
  .wf-stepper { display: flex; align-items: center; gap: 9px; border: 1px solid var(--line); border-radius: 7px; padding: 4px 9px; color: var(--ink-soft); font-size: 13px; flex-shrink: 0; }
  .wf-stepper__n { width: 14px; height: 8px; border-radius: 2px; background: var(--ph-dark); }

  .wf-doc__ft { margin-top: 16px; padding: 16px 18px; border-top: 1px dashed var(--line-strong); font-size: 12px; color: var(--ink-soft); font-family: var(--mono); }
</style>
</head>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="wf-primitives.jsx"></script>
  <script type="text/babel" src="wf-screens.jsx"></script>
  <script type="text/babel" src="wf-shells.jsx"></script>
  <script type="text/babel" src="wf-app.jsx"></script>
</body>
